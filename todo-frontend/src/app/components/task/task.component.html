<div class="container">
  <h2>Lista de Tarefas</h2>

  <form (ngSubmit)="addTask()" class="input-group">
    <input
      [(ngModel)]="newTask"
      name="newTask"
      placeholder="Nova tarefa"
    />

    <button type="submit" class="add-btn">
      Adicionar
    </button>
  </form>

  <ul>
    <li *ngFor="let task of tasks">
      {{ task.title }}

      <button
        type="button"
        class="delete-btn"
        (click)="deleteTask(task.id!)">
        Excluir
      </button>
    </li>
  </ul>
</div>
